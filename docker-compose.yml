version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: taskflow_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./storage:/var/www/storage
    networks:
      - taskflow_network
    depends_on:
      - postgres
      - redis
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-taskflow}
      - DB_USERNAME=${DB_USERNAME:-taskflow}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis

  nginx:
    image: nginx:1.25-alpine
    container_name: taskflow_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - taskflow_network
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    container_name: taskflow_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-taskflow}
      POSTGRES_USER: ${DB_USERNAME:-taskflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - taskflow_network
    # Security: bind to localhost only in development
    # In production: remove ports and use internal network only

  redis:
    image: redis:7-alpine
    container_name: taskflow_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "6379:6379"
    networks:
      - taskflow_network
    volumes:
      - redis_data:/data

  queue_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: taskflow_queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www
    networks:
      - taskflow_network
    depends_on:
      - app
      - redis

networks:
  taskflow_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
